name: FXRacing
options:
  bundleIdPrefix: com.fxracing
  deploymentTarget:
    iOS: "17.0"
  groupSortPosition: top
  createIntermediateGroups: true
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    PRODUCT_NAME: "$(TARGET_NAME)"
    MARKETING_VERSION: "1.4"
    CURRENT_PROJECT_VERSION: "3"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  FXRacing:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FXRacing
    info:
      path: FXRacing/Info.plist
      properties:
        CFBundleDisplayName: FX Racing
        CFBundleIdentifier: com.fxracing.app
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: FXRacing/FXRacing.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fxracing.app
        CODE_SIGN_STYLE: Automatic
        # Set DEVELOPMENT_TEAM to your Apple Developer Team ID before building.
        DEVELOPMENT_TEAM: ""
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
          SWIFT_OPTIMIZATION_LEVEL: "-Owholemodule"
